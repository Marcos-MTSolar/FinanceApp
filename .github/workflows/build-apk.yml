name: Build Android APK

on:
  push:
    branches: [main, master]
  workflow_dispatch:   # Permite disparar manualmente pela aba Actions do GitHub

jobs:
  build-apk:
    name: Build Debug APK
    runs-on: ubuntu-latest

    steps:
      # ── 1. Checkout do código ─────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── 2. Configurar Node.js ─────────────────────────────────────────────
      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      # ── 3. Instalar dependências ──────────────────────────────────────────
      - name: Install dependencies
        run: npm ci

      # ── 4. Build do frontend Vite → /dist ─────────────────────────────────
      - name: Build Vite (frontend)
        run: npm run build
        env:
          # Variáveis de ambiente públicas do Firebase (não são segredos)
          VITE_FIREBASE_API_KEY: ${{ secrets.VITE_FIREBASE_API_KEY }}
          VITE_FIREBASE_AUTH_DOMAIN: ${{ secrets.VITE_FIREBASE_AUTH_DOMAIN }}
          VITE_FIREBASE_PROJECT_ID: ${{ secrets.VITE_FIREBASE_PROJECT_ID }}
          VITE_FIREBASE_STORAGE_BUCKET: ${{ secrets.VITE_FIREBASE_STORAGE_BUCKET }}
          VITE_FIREBASE_MESSAGING_SENDER_ID: ${{ secrets.VITE_FIREBASE_MESSAGING_SENDER_ID }}
          VITE_FIREBASE_APP_ID: ${{ secrets.VITE_FIREBASE_APP_ID }}

      # ── 5. Sincronizar assets do Capacitor → android/ ─────────────────────
      - name: Capacitor sync (copy dist → android assets)
        run: npx cap sync android

      # ── 6. Configurar Java 17 (exigido pelo Android Gradle Plugin 8+) ─────
      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      # ── 7. Cache do Gradle para builds mais rápidos ───────────────────────
      - name: Cache Gradle packages
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      # ── 8. Permissão de execução para o gradlew ───────────────────────────
      - name: Grant execute permission for gradlew
        run: chmod +x android/gradlew

      # ── 9. Atualizar versionCode com o número do run do CI ────────────────
      #  Isso garante que cada APK gerado pelo CI tenha um versionCode único,
      #  o que é obrigatório para distribuição via Play Store ou Firebase App Distribution.
      - name: Bump versionCode to CI run number
        run: |
          sed -i "s/versionCode 1/versionCode ${{ github.run_number }}/" android/app/build.gradle
          echo "versionCode atualizado para: ${{ github.run_number }}"

      # ── 10. Build do APK debug ────────────────────────────────────────────
      - name: Build Debug APK
        working-directory: android
        run: ./gradlew assembleDebug --no-daemon --stacktrace

      # ── 11. Upload do APK como artefato ──────────────────────────────────
      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: financeai-debug-v1.0.${{ github.run_number }}
          path: android/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30   # APK disponível por 30 dias na aba Actions
          if-no-files-found: error

      # ── 12. (Opcional) Notificação de sucesso no log ──────────────────────
      - name: Build summary
        if: success()
        run: |
          echo "✅ APK gerado com sucesso!"
          echo "📦 Nome: financeai-debug-v1.0.${{ github.run_number }}.apk"
          echo "📁 Disponível em: GitHub Actions → aba Artifacts"
          echo "🔢 versionCode: ${{ github.run_number }}"
